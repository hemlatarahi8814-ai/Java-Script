<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Calculator</title>

    <link rel="stylesheet" href="style_calculator.css">
</head>
<body>
    
    <div class="calc">
    <div class="title"></div>

<div class="grid"></div>

<input id="result" type="text" placeholder="Result"readonly>

<button class="btn op" onclick="setScreenValue('+')">+</button>


<button class="btn"
 onclick="setScreenValue('1')">1</button>
 <button class="btn"
 onclick="setScreenValue('2')">2</button>
 <button class="btn"
 onclick="setScreenValue('3')">3</button>
 <button class="btn op" onclick="setScreenValue('-')">-</button>

 <button class="btn"
 onclick="setScreenValue('4')">4</button>
 <button class="btn"
 onclick="setScreenValue('5')">5</button>
 <button class="btn"
 onclick="setScreenValue('6')">6</button>
 <button class="btn op" onclick="setScreenValue('*')">x</button>

 <button class="btn"
 onclick="setScreenValue('7')">7</button>
 <button class="btn"
 onclick="setScreenValue('8')">8</button>
 <button class="btn"
 onclick="setScreenValue('9')">9</button>
 <button class="btn op" onclick="setScreenValue('/')">/</button>
 
 <button class="btn op" onclick="setScreenValue('%')">%</button>
 
<button class="btn"
 onclick="setScreenValue('0')">0</button>
 <button class="btn op" onclick="setScreenValue('.')">.</button>
 <button class="btn op" onclick="setScreenValue('=')">=</button>
 
 </div>

 <button class="btn op" onclick="clearscreen()">CLEAR</button>
</div>
 <script src="app.js"></script>
</body>
</html>
